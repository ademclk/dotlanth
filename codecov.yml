# Codecov Configuration for dotlanth (OPTIONAL)
# https://docs.codecov.io/docs/codecovyml-reference
#
# Codecov is FREE for public repositories.
# This file is only needed if you want to use Codecov for coverage tracking.
# Without this, coverage is still generated and stored as GitHub artifacts.

codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

ignore:
  - "tests/**"
  - "benchmarks/**"
  - "fuzz/**"
  - "build/**"
  - "**/build/**"
  - "**/_deps/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: no
