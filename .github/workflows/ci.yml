name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: Build (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang-19, gcc-14]
        build_type: [Release, Debug]
        include:
          - compiler: clang-19
            cc: clang-19
            cxx: clang++-19
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Clang 19
        if: matrix.compiler == 'clang-19'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main"
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 libc++-19-dev libc++abi-19-dev

      - name: Install GCC 14
        if: matrix.compiler == 'gcc-14'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Install build dependencies
        run: |
          sudo apt-get install -y cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DDOTVM_BUILD_TESTS=ON \
            -DDOTVM_ENABLE_SANITIZERS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j $(nproc)

      - name: Run tests
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure --verbose -j $(nproc)

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Clang tools
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main"
          sudo apt-get update
          sudo apt-get install -y clang-19 clang++-19 clang-tidy-19 clang-format-19 \
            libc++-19-dev libc++abi-19-dev cmake ninja-build

      - name: Configure CMake (for compile_commands.json)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Check code formatting
        run: |
          find include src -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-19 --dry-run --Werror

      - name: Run clang-tidy
        run: |
          find include src -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-tidy-19 -p build --warnings-as-errors='*'
        continue-on-error: true  # Initial run may have warnings to fix

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build lcov gcc-14 g++-14

      - name: Configure CMake with coverage
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DDOTVM_BUILD_TESTS=ON \
            -DDOTVM_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -j $(nproc)

      - name: Generate coverage report
        run: |
          lcov --directory build --capture --output-file coverage.info \
            --gcov-tool gcov-14 --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' \
            --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  format-check:
    name: Format Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main"
          sudo apt-get update
          sudo apt-get install -y clang-format-19

      - name: Check formatting
        run: |
          find include src tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-19 --dry-run --Werror
