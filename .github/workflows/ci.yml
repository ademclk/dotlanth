# Main CI Pipeline for dotlanth
# Builds and tests with C++26 on Ubuntu + Clang 19
#
# Security: This workflow only uses safe context variables.
# Cost: All tools are free.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CTEST_PARALLEL_LEVEL: 4

jobs:
  build:
    name: ubuntu-clang19-${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Clang 19
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get install -y clang-19 clang++-19

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-ubuntu-clang19-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-ubuntu-clang19-

      - name: Configure CMake
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DDOTVM_BUILD_TESTS=ON \
            -DDOTVM_BUILD_C_API=ON \
            -DDOTVM_ENABLE_SIMD=OFF \
            -DDOTVM_ENABLE_JIT=ON

      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: cmake --build build --config "$BUILD_TYPE"

      - name: Run Tests
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: ctest --test-dir build --output-on-failure -C "$BUILD_TYPE"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7
