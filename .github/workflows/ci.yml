# Main CI Pipeline for dotlanth
# Builds and tests on multiple platforms with C++26 support
#
# Security: This workflow only uses safe context variables (matrix.*, github.workspace)
# No untrusted user inputs are used in run commands.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CTEST_PARALLEL_LEVEL: 4

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu with Clang 19 (primary)
          - os: ubuntu-24.04
            compiler: clang
            cxx: clang++-19
            cc: clang-19
            build_type: Debug
          - os: ubuntu-24.04
            compiler: clang
            cxx: clang++-19
            cc: clang-19
            build_type: Release
          # Ubuntu with GCC 14 (secondary)
          - os: ubuntu-24.04
            compiler: gcc
            cxx: g++-14
            cc: gcc-14
            build_type: Debug
          - os: ubuntu-24.04
            compiler: gcc
            cxx: g++-14
            cc: gcc-14
            build_type: Release
          # macOS with AppleClang
          - os: macos-14
            compiler: appleclang
            cxx: clang++
            cc: clang
            build_type: Debug
          - os: macos-14
            compiler: appleclang
            cxx: clang++
            cc: clang
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Clang 19 (Ubuntu)
        if: matrix.os == 'ubuntu-24.04' && matrix.compiler == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get install -y clang-19 clang++-19 libc++-19-dev libc++abi-19-dev

      - name: Install GCC 14 (Ubuntu)
        if: matrix.os == 'ubuntu-24.04' && matrix.compiler == 'gcc'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DDOTVM_BUILD_TESTS=ON \
            -DDOTVM_BUILD_C_API=ON \
            -DDOTVM_ENABLE_SIMD=OFF \
            -DDOTVM_ENABLE_JIT=ON

      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: cmake --build build --config "$BUILD_TYPE"

      - name: Run Tests
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: ctest --test-dir build --output-on-failure -C "$BUILD_TYPE"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7
