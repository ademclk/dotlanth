name: Backend

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.FRONTEND_SUBMODULE_SSH_KEY }}
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'dotlanth.slnx') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --tlp:off -m:1 -nr:false -v:minimal

      - name: Build
        run: dotnet build --tlp:off -m:1 -nr:false --no-restore -v:minimal

      - name: Test
        run: dotnet test --tlp:off -m:1 -nr:false --no-build -v:minimal
