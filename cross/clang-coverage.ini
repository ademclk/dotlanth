# Clang + Code Coverage native file for DotLanth
# Coverage instrumentation for measuring test effectiveness
#
# Usage: meson setup build-cov --native-file cross/clang-coverage.ini --buildtype=debug
#
# After running tests:
#   llvm-profdata merge -sparse default.profraw -o coverage.profdata
#   llvm-cov show ./build-cov/dotvm_tests -instr-profile=coverage.profdata

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
objcopy = 'llvm-objcopy'
ld = 'ld.lld'

[built-in options]
c_args = ['-fprofile-instr-generate', '-fcoverage-mapping']
c_link_args = ['-fprofile-instr-generate', '-fuse-ld=lld']
cpp_args = ['-stdlib=libc++', '-fprofile-instr-generate', '-fcoverage-mapping']
cpp_link_args = ['-stdlib=libc++', '-lc++abi', '-fprofile-instr-generate', '-fuse-ld=lld']

[properties]
cpp_std = 'c++2c'
