# Clang + MemorySanitizer native file for DotLanth
# Uninitialized memory read detection
#
# Usage: meson setup build-msan --native-file cross/clang-msan.ini --buildtype=debug
#
# Note: MSan requires all libraries to be built with MSan instrumentation
# This is primarily useful for testing in controlled environments
#
# Environment variables for runtime:
#   MSAN_OPTIONS=poison_in_dtor=1

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
objcopy = 'llvm-objcopy'
ld = 'ld.lld'

[built-in options]
c_args = ['-fsanitize=memory', '-fno-omit-frame-pointer', '-g', '-fsanitize-memory-track-origins=2']
c_link_args = ['-fsanitize=memory', '-fuse-ld=lld']
cpp_args = ['-stdlib=libc++', '-fsanitize=memory', '-fno-omit-frame-pointer', '-g', '-fsanitize-memory-track-origins=2']
cpp_link_args = ['-stdlib=libc++', '-lc++abi', '-fsanitize=memory', '-fuse-ld=lld']

[properties]
cpp_std = 'c++2c'
