# Clang + ThreadSanitizer native file for DotLanth
# Data race detection for concurrent code
#
# Usage: meson setup build-tsan --native-file cross/clang-tsan.ini --buildtype=debug -Djit=false
#
# Note: TSan is incompatible with JIT compilation (mmap with PROT_EXEC)
#
# Environment variables for runtime:
#   TSAN_OPTIONS=second_deadlock_stack=1:history_size=4

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
objcopy = 'llvm-objcopy'
ld = 'ld.lld'

[built-in options]
c_args = ['-fsanitize=thread', '-fno-omit-frame-pointer', '-g']
c_link_args = ['-fsanitize=thread', '-fuse-ld=lld']
cpp_args = ['-stdlib=libc++', '-fsanitize=thread', '-fno-omit-frame-pointer', '-g']
cpp_link_args = ['-stdlib=libc++', '-lc++abi', '-fsanitize=thread', '-fuse-ld=lld']

[properties]
cpp_std = 'c++2c'
