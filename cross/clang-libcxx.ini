# Clang + libc++ native file for DotLanth
# Default development configuration with modern C++ stdlib
#
# Usage: meson setup build --native-file cross/clang-libcxx.ini

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
objcopy = 'llvm-objcopy'
ld = 'ld.lld'

[built-in options]
c_args = []
c_link_args = ['-fuse-ld=lld']
cpp_args = ['-stdlib=libc++']
cpp_link_args = ['-stdlib=libc++', '-lc++abi', '-fuse-ld=lld']

[properties]
# Use C++26 (c++2c until compilers officially support the standard)
cpp_std = 'c++2c'
