# Clang + ASan + UBSan native file for DotLanth
# Memory safety and undefined behavior detection
#
# Usage: meson setup build-asan --native-file cross/clang-asan.ini --buildtype=debug
#
# Environment variables for runtime:
#   ASAN_OPTIONS=detect_leaks=1:check_initialization_order=1:strict_init_order=1
#   UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
objcopy = 'llvm-objcopy'
ld = 'ld.lld'

[built-in options]
c_args = ['-fsanitize=address,undefined', '-fno-omit-frame-pointer', '-g']
c_link_args = ['-fsanitize=address,undefined', '-fuse-ld=lld']
cpp_args = ['-stdlib=libc++', '-fsanitize=address,undefined', '-fno-omit-frame-pointer', '-g']
cpp_link_args = ['-stdlib=libc++', '-lc++abi', '-fsanitize=address,undefined', '-fuse-ld=lld']

[properties]
cpp_std = 'c++2c'
